<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR4ST FREE DIAMOND | 3D PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root {
            --neon: #00d4ff;
            --pro-color: #ffcc00;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3D Video Background */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(40%);
        }

        /* Glassmorphism 3D Box */
        .box {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 35px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            transform: perspective(1000px) rotateX(5deg);
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: perspective(1000px) translateY(0px) rotateX(5deg); }
            50% { transform: perspective(1000px) translateY(-15px) rotateX(2deg); }
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 20px 0;
            background: linear-gradient(to bottom, #fff, var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            font-weight: 900;
        }

        input {
            width: 85%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .btn-blue {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .btn-pro {
            background: linear-gradient(45deg, #ffcc00, #ff6600);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        .points-display {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            border-left: 4px solid var(--neon);
        }

        .points-val {
            font-size: 40px;
            color: #00ff88;
            font-weight: bold;
        }

        #status-msg { font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-vj-loop-background-40018-large.mp4" type="video/mp4">
    </video>

    <div id="auth-section" class="box">
        <h1>FR4ST</h1>
        <p style="color: var(--neon); font-size: 12px; letter-spacing: 2px;">SECURE ACCESS PANEL</p>
        <input type="text" id="user-id" placeholder="Enter Player ID">
        <button class="btn btn-blue" onclick="login()">Enter Database</button>
        <p id="status-msg">v4.0 Technology System</p>
    </div>

    <div id="dashboard" class="box" style="display:none;">
        <h2 id="pro-tag" style="font-size: 14px; color: #aaa;">BASIC MEMBER</h2>
        <p style="font-size: 13px; opacity: 0.6;">SESSION ID: <span id="display-id"></span></p>
        
        <div class="points-display">
            <div style="font-size: 11px; color: var(--neon);">CURRENT POINTS</div>
            <div class="points-val"><span id="user-points">0</span></div>
        </div>
        
        <button class="btn btn-pro" onclick="upgradeToPro()" id="upgrade-btn">🚀 UNLOCK PRO MODE</button>
        <button class="btn btn-blue" onclick="watchAd(1)">Easy Task (Rs. 1)</button>
        <button class="btn" id="pro-ad-btn" style="background:#444; color:#888; cursor:not-allowed;" disabled onclick="watchAd(20)">Pro Task (Locked)</button>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDj-Q98LskW2kqpAkx66EP-TeYvC7_8U4",
            authDomain: "fr4st-ff-store.firebaseapp.com",
            databaseURL: "https://fr4st-ff-store-default-rtdb.firebaseio.com",
            projectId: "fr4st-ff-store",
            storageBucket: "fr4st-ff-store.appspot.com",
            messagingSenderId: "924493805308",
            appId: "1:924493805308:web:e98dd883ce97b0deb0c979",
            measurementId: "G-165DE67X3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUserID = "";

        // Login Logic
        function login() {
            const id = document.getElementById('user-id').value.trim();
            if(!id) return alert("Player ID එක ගහපන්!");
            currentUserID = id;
            
            document.getElementById('status-msg').innerText = "CONNECTING TO DATABASE...";

            db.ref('users/' + id).once('value', (snapshot) => {
                if(!snapshot.exists()) {
                    db.ref('users/' + id).set({ points: 0, isPro: false })
                    .then(() => loadDashboard({ points: 0, isPro: false }))
                    .catch(e => alert("Error: " + e.message));
                } else {
                    loadDashboard(snapshot.val());
                }
            }, (error) => {
                alert("Firebase Rules Error: " + error.message);
            });
        }

        function loadDashboard(data) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('display-id').innerText = currentUserID;
            document.getElementById('user-points').innerText = data.points;
            if(data.isPro) setProUI();
        }

        function setProUI() {
            document.getElementById('pro-tag').innerText = "PRO MEMBER ACTIVE 🔥";
            document.getElementById('pro-tag').style.color = "#ffcc00";
            document.getElementById('pro-ad-btn').disabled = false;
            document.getElementById('pro-ad-btn').style.background = "var(--neon)";
            document.getElementById('pro-ad-btn').style.color = "#000";
            document.getElementById('pro-ad-btn').style.cursor = "pointer";
            document.getElementById('pro-ad-btn').innerText = "Pro Task (Rs. 20)";
            document.getElementById('upgrade-btn').style.display = "none";
        }

        function watchAd(amount) {
            alert("Loading Ad Task...");
            window.open('https://www.google.com', '_blank'); // මෙතනට ඔයාගේ ලින්ක් එක දාන්න
            
            db.ref('users/' + currentUserID + '/points').transaction(p => (p || 0) + amount);
            let p = parseInt(document.getElementById('user-points').innerText);
            document.getElementById('user-points').innerText = p + amount;
        }

        function upgradeToPro() {
            let n = prompt("Activation Number එක ගහන්න:");
            if(n) {
                db.ref('users/' + currentUserID).update({ isPro: true });
                setProUI();
            }
        }
    </script>
</body>
</html>
