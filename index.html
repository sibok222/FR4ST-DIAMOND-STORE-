<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIBOK STORE | RED MATRIX PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root {
            --neon-red: #ff0000;
            --dark-red: #330000;
            --bg-black: #000000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Matrix Canvas Background */
        canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
        }

        .box {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-red);
            border-radius: 10px;
            padding: 30px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px var(--dark-red);
            animation: glitch 5s infinite;
        }

        @keyframes glitch {
            0% { box-shadow: 0 0 10px var(--dark-red); }
            50% { box-shadow: 0 0 25px var(--neon-red); }
            100% { box-shadow: 0 0 10px var(--dark-red); }
        }

        h1 {
            color: var(--neon-red);
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 2px 10px var(--neon-red);
        }

        p.sub-title {
            color: #fff;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        /* Dark & Red Input */
        input {
            width: 85%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(20, 0, 0, 0.9);
            border: 1px solid var(--neon-red);
            border-radius: 5px;
            color: var(--neon-red);
            font-size: 16px;
            outline: none;
            text-align: center;
            font-weight: bold;
        }

        input::placeholder { color: var(--dark-red); }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-red {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 10px var(--neon-red);
        }

        .btn-red:hover {
            background: #b30000;
            box-shadow: 0 0 20px var(--neon-red);
        }

        .btn-pro {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px #fff;
        }

        .points-box {
            border: 1px dashed var(--neon-red);
            padding: 15px;
            margin: 15px 0;
        }

        .points-val {
            font-size: 40px;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-red);
        }

        .status { font-size: 11px; color: var(--neon-red); margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div id="auth-section" class="box">
        <h1>SIBOK</h1>
        <p class="sub-title">SYSTEM ENCRYPTION: ACTIVE</p>
        <input type="text" id="user-id" placeholder="[ ENTER PLAYER ID ]">
        <button class="btn btn-red" onclick="login()">DEPLOY TERMINAL</button>
        <div class="status">SERVER: ONLINE | v2026.V1.1</div>
    </div>

    <div id="dashboard" class="box" style="display:none;">
        <h2 id="pro-tag" style="font-size: 14px; color: var(--neon-red);">[ BASIC ACCESS ]</h2>
        <p style="color: #fff; font-size: 12px;">ID: <span id="display-id"></span></p>
        
        <div class="points-box">
            <div style="font-size: 10px; color: var(--neon-red);">DATABASE POINTS</div>
            <div class="points-val"><span id="user-points">0</span></div>
        </div>
        
        <button class="btn btn-pro" onclick="upgradeToPro()" id="upgrade-btn">ACTIVATE PRO KEY</button>
        <button class="btn btn-red" onclick="watchAd(1)">EXECUTE EASY TASK</button>
        <button class="btn" id="pro-ad-btn" style="background:#222; color:#444; cursor:not-allowed;" disabled onclick="watchAd(20)">PRO TASK (LOCKED)</button>
    </div>

    <script>
        // --- MATRIX ANIMATION ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; // රතු පාට අකුරු
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- FIREBASE LOGIC ---
        const firebaseConfig = {
            apiKey: "AIzaSyDj-Q98LskW2kqpAkx66EP-TeYvC7_8U4",
            authDomain: "fr4st-ff-store.firebaseapp.com",
            databaseURL: "https://fr4st-ff-store-default-rtdb.firebaseio.com",
            projectId: "fr4st-ff-store",
            storageBucket: "fr4st-ff-store.appspot.com",
            messagingSenderId: "924493805308",
            appId: "1:924493805308:web:e98dd883ce97b0deb0c979",
            measurementId: "G-165DE67X3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUserID = "";

        function login() {
            const id = document.getElementById('user-id').value.trim();
            if(!id) return alert("ID ගහපන් බං!");
            currentUserID = id;
            db.ref('users/' + id).once('value', (snapshot) => {
                if(!snapshot.exists()) {
                    db.ref('users/' + id).set({ points: 0, isPro: false });
                    loadDashboard({ points: 0, isPro: false });
                } else {
                    loadDashboard(snapshot.val());
                }
            });
        }

        function loadDashboard(data) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('display-id').innerText = currentUserID;
            document.getElementById('user-points').innerText = data.points;
            if(data.isPro) setProUI();
        }

        function setProUI() {
            document.getElementById('pro-tag').innerText = "[ PRO ACCESS GRANTED ]";
            document.getElementById('pro-ad-btn').disabled = false;
            document.getElementById('pro-ad-btn').className = "btn btn-red";
            document.getElementById('pro-ad-btn').style.cursor = "pointer";
            document.getElementById('pro-ad-btn').innerText = "EXECUTE PRO TASK";
            document.getElementById('upgrade-btn').style.display = "none";
        }

        function watchAd(amount) {
            alert("REDIRECTING TO RED TERMINAL...");
            window.open('https://www.google.com', '_blank'); 
            db.ref('users/' + currentUserID + '/points').transaction(p => (p || 0) + amount);
            let p = parseInt(document.getElementById('user-points').innerText);
            document.getElementById('user-points').innerText = p + amount;
        }

        function upgradeToPro() {
            let n = prompt("ENTER PRO ACCESS KEY:");
            if(n) {
                db.ref('users/' + currentUserID).update({ isPro: true });
                setProUI();
            }
        }
    </script>
</body>
</html>
